<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Class Management – lvlBase Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#0D0D1A;color:#fff;}
.app-sidebar{position:fixed;top:0;left:0;height:100vh;width:260px;background:#12122A;border-right:1px solid rgba(255,255,255,.08);overflow-y:auto;z-index:200;display:flex;flex-direction:column;}
.app-main{margin-left:260px;min-height:100vh;display:flex;flex-direction:column;}
.app-header{height:64px;display:flex;align-items:center;padding:0 24px;background:#12122A;border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:10;gap:12px;}
.app-content{flex:1;padding:24px;background:#0D0D1A;}
.sidebar-logo{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#6C5CE7,#a29bfe);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-text{font-size:18px;font-weight:700;background:linear-gradient(135deg,#6C5CE7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sidebar-nav{flex:1;padding:16px 0;}
.nav-section-title{font-size:11px;font-weight:600;color:rgba(255,255,255,.3);padding:8px 24px 4px;text-transform:uppercase;letter-spacing:1px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 24px;color:rgba(255,255,255,.6);text-decoration:none;font-size:14px;transition:all .2s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(108,92,231,.1);color:#fff;border-left-color:#6C5CE7;}
.nav-item.active{background:rgba(108,92,231,.15);color:#a29bfe;border-left-color:#6C5CE7;}
.nav-icon{font-size:18px;width:22px;text-align:center;}
.sidebar-footer{padding:16px 24px;border-top:1px solid rgba(255,255,255,.08);}
.user-mini{display:flex;align-items:center;gap:10px;}
.user-avatar-sm{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#6C5CE7,#FD79A8);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;}
.user-info-sm{flex:1;min-width:0;}
.user-name-sm{font-size:13px;font-weight:600;color:#fff;}
.user-role-sm{font-size:11px;color:#6C5CE7;}
.header-title{font-size:18px;font-weight:700;flex:1;}
.card{background:#12122A;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:24px;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,#6C5CE7,#a29bfe);color:#fff;}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);}
.classes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:24px;}
.class-card{background:#12122A;border:1px solid rgba(255,255,255,.06);border-radius:16px;overflow:hidden;transition:transform .2s,box-shadow .2s;}
.class-card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.3);}
.class-card-header{padding:20px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;}
.class-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.class-card-body{padding:16px 20px 20px;}
.class-name{font-size:18px;font-weight:800;margin-bottom:4px;}
.class-subject{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:14px;}
.class-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.meta-item{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.55);}
.meta-icon{font-size:14px;}
.class-progress{margin-bottom:14px;}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.4);margin-bottom:6px;}
.progress-track{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;}
.class-actions{display:flex;gap:8px;}
.action-btn{flex:1;padding:8px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-align:center;}
.action-edit{background:rgba(108,92,231,.15);color:#a29bfe;}
.action-edit:hover{background:rgba(108,92,231,.3);}
.action-view{background:rgba(0,206,201,.15);color:#00CEC9;}
.action-view:hover{background:rgba(0,206,201,.3);}
.action-del{background:rgba(214,48,49,.1);color:#D63031;}
.action-del:hover{background:rgba(214,48,49,.2);}
.add-class-form{background:rgba(108,92,231,.08);border:1px solid rgba(108,92,231,.25);border-radius:16px;padding:24px;margin-bottom:24px;display:none;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-field{display:flex;flex-direction:column;gap:6px;}
.form-field label{font-size:12px;font-weight:600;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;}
.form-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:#6C5CE7;}
.form-select{background:#1a1a35;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;outline:none;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-mini{background:#12122A;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:16px;text-align:center;}
.stat-mini-val{font-size:24px;font-weight:800;}
.stat-mini-lbl{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;}
@media(max-width:1100px){.classes-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:700px){.classes-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<aside class="app-sidebar">
  <div class="sidebar-logo"><div class="logo-icon">⚡</div><span class="logo-text">lvlBase</span></div>
  <nav class="sidebar-nav">
    <div class="nav-section-title">Admin</div>
    <a href="/app/admin/dashboard.html" class="nav-item"><span class="nav-icon">🏫</span>Dashboard</a>
    <a href="/app/admin/user-management.html" class="nav-item"><span class="nav-icon">👥</span>User Management</a>
    <a href="/app/admin/class-management.html" class="nav-item active"><span class="nav-icon">📚</span>Class Management</a>
    <a href="/app/admin/reports.html" class="nav-item"><span class="nav-icon">📊</span>Reports</a>
    <div class="nav-section-title">Communication</div>
    <a href="/app/admin/announcements.html" class="nav-item"><span class="nav-icon">📣</span>Announcements</a>
    <div class="nav-section-title">Account</div>
    <a href="/app/admin/billing.html" class="nav-item"><span class="nav-icon">💳</span>Billing</a>
    <a href="/app/admin/settings.html" class="nav-item"><span class="nav-icon">⚙️</span>Settings</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-mini">
      <div class="user-avatar-sm" id="avatarInitial">A</div>
      <div class="user-info-sm">
        <div class="user-name-sm" id="sidebarName">Admin</div>
        <div class="user-role-sm">School Administrator</div>
      </div>
    </div>
  </div>
</aside>

<main class="app-main">
  <header class="app-header">
    <span style="font-size:22px">📚</span>
    <span class="header-title">Class Management</span>
    <button onclick="toggleAddForm()" class="btn btn-primary">➕ Add New Class</button>
    <button onclick="LvlAuth.signOut()" class="btn" style="background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);font-size:13px;padding:8px 16px;border-radius:10px;cursor:pointer;border:none;">Sign Out</button>
    <div class="user-avatar-sm" id="headerAvatar" style="width:36px;height:36px;font-size:15px;">A</div>
  </header>
  <div class="app-content">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-mini"><div class="stat-mini-val" style="color:#6C5CE7;">18</div><div class="stat-mini-lbl">Active Classes</div></div>
      <div class="stat-mini"><div class="stat-mini-val" style="color:#00CEC9;">348</div><div class="stat-mini-lbl">Enrolled Students</div></div>
      <div class="stat-mini"><div class="stat-mini-val" style="color:#FDCB6E;">24</div><div class="stat-mini-lbl">Teachers Assigned</div></div>
      <div class="stat-mini"><div class="stat-mini-val" style="color:#00b894;">19.3</div><div class="stat-mini-lbl">Avg Class Size</div></div>
    </div>

    <!-- Add Class Form -->
    <div class="add-class-form" id="addClassForm">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
        <div style="font-size:16px;font-weight:700;">📚 Create New Class</div>
        <button onclick="toggleAddForm()" style="background:none;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer;">✕</button>
      </div>
      <div class="form-grid">
        <div class="form-field"><label>Class Name</label><input class="form-input" type="text" placeholder="e.g. Advanced Mathematics 9-A"></div>
        <div class="form-field"><label>Grade Level</label>
          <select class="form-select"><option>Grade 7</option><option>Grade 8</option><option>Grade 9</option><option>Grade 10</option><option>Grade 11</option><option>Grade 12</option></select>
        </div>
        <div class="form-field"><label>Subject / Track</label><input class="form-input" type="text" placeholder="e.g. Mathematics, STEM, AP Computer Science"></div>
        <div class="form-field"><label>Assign Teacher</label>
          <select class="form-select"><option>Dr. Maria Rivera</option><option>Prof. Lee Chang</option><option>Ms. Priya Sharma</option><option>Mr. David Kim</option><option>Ms. Sarah Brown</option></select>
        </div>
        <div class="form-field"><label>Schedule (Days)</label>
          <select class="form-select"><option>Mon / Wed / Fri</option><option>Tue / Thu</option><option>Mon–Fri</option><option>Mon / Wed</option></select>
        </div>
        <div class="form-field"><label>Class Time</label><input class="form-input" type="time" value="09:00"></div>
        <div class="form-field"><label>Room / Location</label><input class="form-input" type="text" placeholder="e.g. Room 204 or Virtual"></div>
        <div class="form-field"><label>Max Capacity</label><input class="form-input" type="number" placeholder="30" min="5" max="60"></div>
      </div>
      <div style="margin-top:16px;display:flex;gap:10px;">
        <button onclick="submitAddClass()" class="btn btn-primary">✅ Create Class</button>
        <button onclick="toggleAddForm()" class="btn" style="background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);border:none;">Cancel</button>
      </div>
    </div>

    <!-- Search + Filter -->
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap;">
      <input type="text" placeholder="🔍  Search classes…" style="background:#12122A;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 16px;color:#fff;font-size:14px;outline:none;flex:1;min-width:200px;">
      <select style="background:#12122A;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7);padding:10px 14px;border-radius:12px;font-size:13px;outline:none;">
        <option value="">All Grades</option><option>Grade 8</option><option>Grade 9</option><option>Grade 10</option><option>Grade 11</option><option>Grade 12</option>
      </select>
      <select style="background:#12122A;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7);padding:10px 14px;border-radius:12px;font-size:13px;outline:none;">
        <option value="">All Teachers</option><option>Dr. Rivera</option><option>Prof. Chang</option><option>Ms. Sharma</option>
      </select>
    </div>

    <!-- Classes Grid -->
    <div class="classes-grid" id="classesGrid"></div>

  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="/core/js/firebase/init.js"></script>
<script src="/core/js/core/state.js"></script>
<script src="/core/js/core/ui-components.js"></script>
<script src="/core/js/core/security.js"></script>
<script src="/core/js/firebase/auth.js"></script>
<script src="/core/js/firebase/firestore.js"></script>
<script>
const CLASSES = [
  {name:'Advanced Mathematics', section:'9-A', grade:'Grade 9', teacher:'Dr. Maria Rivera', students:28, cap:30, schedule:'Mon/Wed/Fri', time:'9:00 AM', room:'Room 201', progress:72, color:'#6C5CE7', emoji:'🔢', subject:'Mathematics'},
  {name:'AP Computer Science', section:'11-A', grade:'Grade 11', teacher:'Prof. Lee Chang', students:22, cap:25, schedule:'Tue/Thu', time:'10:30 AM', room:'Lab 104', progress:85, color:'#00CEC9', emoji:'💻', subject:'Computer Science'},
  {name:'English Literature', section:'8-B', grade:'Grade 8', teacher:'Ms. Priya Sharma', students:25, cap:30, schedule:'Mon–Fri', time:'8:00 AM', room:'Room 112', progress:61, color:'#FD79A8', emoji:'📖', subject:'English'},
  {name:'Physics Fundamentals', section:'10-A', grade:'Grade 10', teacher:'Mr. David Kim', students:20, cap:25, schedule:'Mon/Wed/Fri', time:'1:00 PM', room:'Lab 302', progress:54, color:'#FDCB6E', emoji:'⚛️', subject:'Science'},
  {name:'World History', section:'9-B', grade:'Grade 9', teacher:'Ms. Sarah Brown', students:27, cap:30, schedule:'Tue/Thu', time:'11:00 AM', room:'Room 215', progress:68, color:'#00b894', emoji:'🌍', subject:'History'},
  {name:'Algebra II', section:'10-B', grade:'Grade 10', teacher:'Dr. Maria Rivera', students:24, cap:30, schedule:'Mon/Wed/Fri', time:'2:30 PM', room:'Room 201', progress:79, color:'#6C5CE7', emoji:'📐', subject:'Mathematics'},
  {name:'Creative Writing', section:'11-B', grade:'Grade 11', teacher:'Ms. Priya Sharma', students:18, cap:20, schedule:'Mon/Wed', time:'10:00 AM', room:'Room 110', progress:90, color:'#FD79A8', emoji:'✍️', subject:'English'},
  {name:'Chemistry Lab', section:'12-A', grade:'Grade 12', teacher:'Mr. David Kim', students:16, cap:20, schedule:'Tue/Thu', time:'2:00 PM', room:'Lab 305', progress:48, color:'#FDCB6E', emoji:'🧪', subject:'Science'},
  {name:'Web Development', section:'10-C', grade:'Grade 10', teacher:'Prof. Lee Chang', students:19, cap:25, schedule:'Mon/Wed/Fri', time:'3:00 PM', room:'Lab 104', progress:83, color:'#00CEC9', emoji:'🌐', subject:'Computer Science'},
];

function renderClasses() {
  const grid = document.getElementById('classesGrid');
  grid.innerHTML = '';
  CLASSES.forEach(c => {
    const fillPct = Math.round(c.students / c.cap * 100);
    grid.innerHTML += `
    <div class="class-card">
      <div class="class-card-header">
        <div>
          <span class="class-badge" style="background:rgba(${hexToRgb(c.color)},.2);color:${c.color}">${c.grade}</span>
        </div>
        <div style="font-size:28px;">${c.emoji}</div>
      </div>
      <div class="class-card-body">
        <div class="class-name">${c.name}</div>
        <div class="class-subject" style="color:${c.color};opacity:.8">Section ${c.section} · ${c.subject}</div>
        <div class="class-meta">
          <div class="meta-item"><span class="meta-icon">👩‍🏫</span>${c.teacher.split(' ').slice(-1)[0]}</div>
          <div class="meta-item"><span class="meta-icon">👥</span>${c.students}/${c.cap} students</div>
          <div class="meta-item"><span class="meta-icon">📅</span>${c.schedule}</div>
          <div class="meta-item"><span class="meta-icon">🕐</span>${c.time}</div>
          <div class="meta-item"><span class="meta-icon">🚪</span>${c.room}</div>
          <div class="meta-item"><span class="meta-icon">📊</span>${c.progress}% complete</div>
        </div>
        <div class="class-progress">
          <div class="progress-label"><span>Curriculum Progress</span><span style="color:${c.color}">${c.progress}%</span></div>
          <div class="progress-track"><div class="progress-fill" style="width:${c.progress}%;background:linear-gradient(90deg,${c.color},${c.color}88)"></div></div>
        </div>
        <div class="class-progress" style="margin-bottom:14px;">
          <div class="progress-label"><span>Capacity</span><span>${fillPct}%</span></div>
          <div class="progress-track"><div class="progress-fill" style="width:${fillPct}%;background:${fillPct>90?'#D63031':fillPct>70?'#FDCB6E':'#00b894'}"></div></div>
        </div>
        <div class="class-actions">
          <button class="action-btn action-view">👁 View</button>
          <button class="action-btn action-edit">✏️ Edit</button>
          <button class="action-btn action-del">🗑</button>
        </div>
      </div>
    </div>`;
  });
}

function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16);const g=parseInt(hex.slice(3,5),16);const b=parseInt(hex.slice(5,7),16);return `${r},${g},${b}`;}

function toggleAddForm() {
  const f = document.getElementById('addClassForm');
  f.style.display = f.style.display === 'block' ? 'none' : 'block';
}

function submitAddClass() {
  alert('Class created successfully!');
  toggleAddForm();
}

function loadPage() {
  LvlAuth.requireAuth(['schoolAdmin']);
  renderClasses();
}

firebase.auth().onAuthStateChanged(user => {
  if (!user) { window.location.href = '/auth/login.html'; return; }
  const name = user.displayName || user.email.split('@')[0] || 'Admin';
  document.getElementById('sidebarName').textContent = name;
  const init = name.charAt(0).toUpperCase();
  document.getElementById('avatarInitial').textContent = init;
  document.getElementById('headerAvatar').textContent = init;
  loadPage();
});

LvlSecurity.initActivityTracking();
</script>
</body>
</html>
