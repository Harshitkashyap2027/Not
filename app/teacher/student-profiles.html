<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Student Profiles – lvlBase</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="/core/js/firebase/init.js"></script>
<script src="/core/js/core/state.js"></script>
<script src="/core/js/core/ui-components.js"></script>
<script src="/core/js/core/security.js"></script>
<script src="/core/js/firebase/auth.js"></script>
<script src="/core/js/firebase/firestore.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#0D0D1A;color:#fff;}
.app-sidebar{position:fixed;top:0;left:0;height:100vh;width:260px;background:#12122A;border-right:1px solid rgba(255,255,255,.08);overflow-y:auto;z-index:200;display:flex;flex-direction:column;}
.app-main{margin-left:260px;min-height:100vh;display:flex;flex-direction:column;}
.app-header{height:64px;display:flex;align-items:center;padding:0 24px;background:#12122A;border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:10;gap:12px;}
.app-content{flex:1;padding:24px;background:#0D0D1A;}
.sidebar-logo{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#6C5CE7,#a29bfe);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-text{font-size:18px;font-weight:700;background:linear-gradient(135deg,#6C5CE7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sidebar-nav{flex:1;padding:16px 0;}
.nav-section-title{font-size:11px;font-weight:600;color:rgba(255,255,255,.3);padding:8px 24px 4px;text-transform:uppercase;letter-spacing:1px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 24px;color:rgba(255,255,255,.6);text-decoration:none;font-size:14px;transition:all .2s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(108,92,231,.1);color:#fff;border-left-color:#6C5CE7;}
.nav-item.active{background:rgba(108,92,231,.15);color:#a29bfe;border-left-color:#6C5CE7;}
.nav-icon{font-size:18px;width:22px;text-align:center;}
.sidebar-footer{padding:16px 24px;border-top:1px solid rgba(255,255,255,.08);}
.user-mini{display:flex;align-items:center;gap:10px;}
.user-avatar-sm{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#00CEC9,#6C5CE7);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;}
.user-info-sm{flex:1;min-width:0;}
.user-name-sm{font-size:13px;font-weight:600;color:#fff;}
.user-role-sm{font-size:11px;color:#00CEC9;}
.header-title{font-size:18px;font-weight:700;flex:1;}
.controls-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.search-input{flex:1;min-width:220px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 14px;color:#fff;font-size:13px;outline:none;}
.search-input:focus{border-color:#6C5CE7;}
.search-input::placeholder{color:rgba(255,255,255,.3);}
.filter-select{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 14px;color:#fff;font-size:13px;outline:none;cursor:pointer;}
.sort-btn{padding:9px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);font-size:12px;cursor:pointer;transition:all .2s;}
.sort-btn:hover,.sort-btn.active{background:rgba(108,92,231,.15);border-color:#6C5CE7;color:#a29bfe;}
.students-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.student-card{background:#12122A;border:1px solid rgba(255,255,255,.06);border-radius:16px;overflow:hidden;transition:transform .2s,box-shadow .2s;}
.student-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4);}
.sc-header{padding:20px 20px 16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(255,255,255,.05);}
.sc-avatar{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0;}
.sc-name{font-size:15px;font-weight:700;}
.sc-class{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px;}
.sc-rank{font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px;display:inline-block;margin-top:4px;}
.sc-body{padding:16px 20px;}
.sc-stats{display:flex;gap:0;margin-bottom:14px;}
.sc-stat{flex:1;text-align:center;}
.sc-stat-val{font-size:16px;font-weight:800;}
.sc-stat-lbl{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;}
.sc-stat:not(:last-child){border-right:1px solid rgba(255,255,255,.06);}
.xp-bar-wrap{margin-bottom:12px;}
.xp-bar-label{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.4);margin-bottom:5px;}
.xp-bar-track{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.xp-bar-fill{height:100%;border-radius:3px;}
.recent-grades{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.grade-pill{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:700;}
.grade-a{background:rgba(0,184,148,.15);color:#00b894;}
.grade-b{background:rgba(108,92,231,.15);color:#a29bfe;}
.grade-c{background:rgba(253,203,110,.15);color:#FDCB6E;}
.sc-footer{display:flex;gap:8px;}
.sc-btn{flex:1;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:rgba(255,255,255,.6);cursor:pointer;font-size:12px;transition:all .2s;}
.sc-btn:hover{background:rgba(108,92,231,.2);border-color:#6C5CE7;color:#a29bfe;}
.at-risk{border-color:rgba(253,121,168,.3);}
.at-risk .sc-header{background:rgba(253,121,168,.05);}
@media(max-width:600px){.students-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<aside class="app-sidebar">
  <div class="sidebar-logo"><div class="logo-icon">⚡</div><span class="logo-text">lvlBase</span></div>
  <nav class="sidebar-nav">
    <div class="nav-section-title">Teach</div>
    <a href="/app/teacher/dashboard.html" class="nav-item"><span class="nav-icon">🏠</span>Dashboard</a>
    <a href="/app/teacher/class-manager.html" class="nav-item"><span class="nav-icon">🏫</span>My Classes</a>
    <a href="/app/teacher/quest-builder.html" class="nav-item"><span class="nav-icon">⚔️</span>Quest Builder</a>
    <a href="/app/teacher/gradebook.html" class="nav-item"><span class="nav-icon">📋</span>Gradebook</a>
    <a href="/app/teacher/assignment-builder.html" class="nav-item"><span class="nav-icon">📝</span>Assignments</a>
    <a href="/app/teacher/live-session.html" class="nav-item"><span class="nav-icon">🔴</span>Live Session</a>
    <div class="nav-section-title">Students</div>
    <a href="/app/teacher/student-profiles.html" class="nav-item active"><span class="nav-icon">👥</span>Student Profiles</a>
    <a href="/app/teacher/analytics.html" class="nav-item"><span class="nav-icon">📊</span>Analytics</a>
    <div class="nav-section-title">Tools</div>
    <a href="/app/teacher/ai-tools.html" class="nav-item"><span class="nav-icon">🤖</span>AI Tools</a>
    <a href="/app/teacher/announcements.html" class="nav-item"><span class="nav-icon">📢</span>Announcements</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-mini">
      <div class="user-avatar-sm" id="avatarInitial">T</div>
      <div class="user-info-sm"><div class="user-name-sm" id="sidebarName">Loading…</div><div class="user-role-sm">Teacher</div></div>
    </div>
    <button onclick="LvlAuth.signOut()" style="margin-top:10px;width:100%;background:rgba(253,121,168,.1);border:1px solid rgba(253,121,168,.2);color:#FD79A8;padding:8px;border-radius:8px;cursor:pointer;font-size:12px;">Sign Out</button>
  </div>
</aside>

<main class="app-main">
  <header class="app-header">
    <span style="font-size:22px">👥</span>
    <span class="header-title">Student Profiles</span>
    <div style="font-size:13px;color:rgba(255,255,255,.4);" id="countLabel">142 students</div>
  </header>
  <div class="app-content">
    <div class="controls-bar">
      <input class="search-input" id="searchInput" placeholder="🔍 Search by name or email…" oninput="filterStudents()" />
      <select class="filter-select" id="classFilter" onchange="filterStudents()">
        <option value="">All Classes</option>
        <option value="Math P3">Math — Period 3</option>
        <option value="Science P1">Science — Period 1</option>
        <option value="English P2">English — Period 2</option>
        <option value="History P5">History — Period 5</option>
        <option value="CS P6">CS — Period 6</option>
        <option value="Physics P4">Physics — Period 4</option>
      </select>
      <select class="filter-select" id="statusFilter" onchange="filterStudents()">
        <option value="">All Students</option>
        <option value="active">Active (Today)</option>
        <option value="risk">At Risk</option>
        <option value="top">Top Performers</option>
      </select>
      <button class="sort-btn active" onclick="setSort(this,'xp')">⚡ Sort by XP</button>
      <button class="sort-btn" onclick="setSort(this,'grade')">📊 Sort by Grade</button>
      <button class="sort-btn" onclick="setSort(this,'name')">🔤 Sort by Name</button>
    </div>
    <div class="students-grid" id="studentGrid"></div>
  </div>
</main>

<script>
const students = [
  {name:'Emma Wilson',class:'CS P6',xp:4820,level:14,rank:'Legendary',rankColor:'#FDCB6E',avg:96,streak:22,quests:31,lastActive:'2m ago',grades:['A','A','A+','A'],color:'#00b894',risk:false},
  {name:'Maya Patel',class:'Math P3',xp:4650,level:13,rank:'Master',rankColor:'#a29bfe',avg:94,streak:18,quests:29,lastActive:'Today',grades:['A','A','B+','A'],color:'#6C5CE7',risk:false},
  {name:'Priya Singh',class:'Science P1',xp:4510,level:13,rank:'Master',rankColor:'#a29bfe',avg:93,streak:15,quests:28,lastActive:'Today',grades:['A','A-','A','A'],color:'#00CEC9',risk:false},
  {name:'Amelia Rodriguez',class:'English P2',xp:4390,level:12,rank:'Expert',rankColor:'#00CEC9',avg:92,streak:12,quests:27,lastActive:'Today',grades:['A','A','B+','A'],color:'#FD79A8',risk:false},
  {name:'Abigail Hall',class:'History P5',xp:4200,level:12,rank:'Expert',rankColor:'#00CEC9',avg:91,streak:20,quests:26,lastActive:'1h ago',grades:['A','A-','A','B+'],color:'#FDCB6E',risk:false},
  {name:'Alex Rivera',class:'Math P3',xp:3980,level:11,rank:'Pro',rankColor:'#6C5CE7',avg:88,streak:9,quests:24,lastActive:'Today',grades:['A-','B+','A','B'],color:'#6C5CE7',risk:false},
  {name:'Carlos Diaz',class:'Math P3',xp:3720,level:10,rank:'Pro',rankColor:'#6C5CE7',avg:86,streak:7,quests:22,lastActive:'2h ago',grades:['B+','A-','B','A'],color:'#a29bfe',risk:false},
  {name:'Harper Lewis',class:'English P2',xp:3580,level:10,rank:'Advanced',rankColor:'#FD79A8',avg:85,streak:11,quests:21,lastActive:'Today',grades:['B+','A-','B+','A-'],color:'#FD79A8',risk:false},
  {name:'Mia Williams',class:'English P2',xp:3490,level:10,rank:'Advanced',rankColor:'#FD79A8',avg:84,streak:8,quests:20,lastActive:'Today',grades:['B','B+','A-','B+'],color:'#00CEC9',risk:false},
  {name:'Jordan Lee',class:'Math P3',xp:2980,level:9,rank:'Intermediate',rankColor:'#00b894',avg:79,streak:5,quests:18,lastActive:'Yesterday',grades:['B','C+','B+','B'],color:'#FD79A8',risk:false},
  {name:'Liam Brooks',class:'Math P3',xp:2760,level:8,rank:'Intermediate',rankColor:'#00b894',avg:77,streak:3,quests:15,lastActive:'2d ago',grades:['B-','B','C+','B'],color:'#00CEC9',risk:false},
  {name:'Sam Nguyen',class:'Math P3',xp:2100,level:7,rank:'Learner',rankColor:'rgba(255,255,255,.4)',avg:73,streak:2,quests:12,lastActive:'3d ago',grades:['C+','C','B-','C+'],color:'#FDCB6E',risk:false},
  {name:'Noah Kim',class:'Math P3',xp:1650,level:5,rank:'Learner',rankColor:'rgba(255,255,255,.4)',avg:66,streak:0,quests:8,lastActive:'5d ago',grades:['D+','C','D','C-'],color:'#FDCB6E',risk:true},
  {name:'Oliver Johnson',class:'Math P3',xp:1240,level:4,rank:'Beginner',rankColor:'rgba(255,255,255,.3)',avg:62,streak:0,quests:5,lastActive:'1w ago',grades:['D','C-','D+','D'],color:'#00CEC9',risk:true},
  {name:'Elijah Walker',class:'History P5',xp:1480,level:5,rank:'Learner',rankColor:'rgba(255,255,255,.4)',avg:63,streak:1,quests:7,lastActive:'4d ago',grades:['D+','C-','C','D+'],color:'#FDCB6E',risk:true},
];

function getGradeBadge(g) {
  if (g.startsWith('A')) return 'grade-a';
  if (g.startsWith('B')) return 'grade-b';
  return 'grade-c';
}

function renderStudents(data) {
  const grid = document.getElementById('studentGrid');
  grid.innerHTML = '';
  document.getElementById('countLabel').textContent = `${data.length} students`;
  data.forEach(s => {
    const initials = s.name.split(' ').map(n=>n[0]).join('');
    const xpToNext = 5000;
    const xpPct = Math.min(Math.round(s.xp / xpToNext * 100), 100);
    const avgCol = s.avg >= 85 ? '#00b894' : s.avg >= 75 ? '#FDCB6E' : '#FD79A8';
    grid.innerHTML += `<div class="student-card${s.risk ? ' at-risk' : ''}">
      <div class="sc-header">
        <div class="sc-avatar" style="background:linear-gradient(135deg,${s.color},${s.color}88)">${initials}</div>
        <div style="flex:1">
          <div class="sc-name">${s.name}</div>
          <div class="sc-class">${s.class}</div>
          <span class="sc-rank" style="background:${s.rankColor}22;color:${s.rankColor}">⭐ ${s.rank}</span>
        </div>
        ${s.risk ? '<span style="font-size:18px" title="At Risk">⚠️</span>' : ''}
      </div>
      <div class="sc-body">
        <div class="sc-stats">
          <div class="sc-stat"><div class="sc-stat-val" style="color:${avgCol}">${s.avg}%</div><div class="sc-stat-lbl">Avg Grade</div></div>
          <div class="sc-stat"><div class="sc-stat-val" style="color:#FDCB6E">${(s.xp/1000).toFixed(1)}k</div><div class="sc-stat-lbl">XP</div></div>
          <div class="sc-stat"><div class="sc-stat-val" style="color:#FD79A8">🔥${s.streak}</div><div class="sc-stat-lbl">Streak</div></div>
          <div class="sc-stat"><div class="sc-stat-val" style="color:#a29bfe">${s.quests}</div><div class="sc-stat-lbl">Quests</div></div>
        </div>
        <div class="xp-bar-wrap">
          <div class="xp-bar-label"><span>Level ${s.level}</span><span>${s.xp.toLocaleString()} / ${xpToNext.toLocaleString()} XP</span></div>
          <div class="xp-bar-track"><div class="xp-bar-fill" style="width:${xpPct}%;background:linear-gradient(90deg,${s.color},${s.color}88)"></div></div>
        </div>
        <div style="font-size:11px;color:rgba(255,255,255,.35);margin-bottom:8px;">Recent grades:</div>
        <div class="recent-grades">
          ${s.grades.map(g=>`<span class="grade-pill ${getGradeBadge(g)}">${g}</span>`).join('')}
        </div>
        <div style="font-size:11px;color:rgba(255,255,255,.3);">Last active: ${s.lastActive}</div>
        <div style="height:12px;"></div>
        <div class="sc-footer">
          <button class="sc-btn">👁️ View Profile</button>
          <button class="sc-btn">📩 Message</button>
          <button class="sc-btn">📋 Grades</button>
        </div>
      </div>
    </div>`;
  });
}

function filterStudents() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const classF = document.getElementById('classFilter').value;
  const statusF = document.getElementById('statusFilter').value;
  let filtered = students.filter(s => {
    const matchSearch = s.name.toLowerCase().includes(search);
    const matchClass = !classF || s.class.includes(classF.split(' ')[0]);
    let matchStatus = true;
    if (statusF === 'active') matchStatus = s.lastActive.includes('Today') || s.lastActive.includes('m ago') || s.lastActive.includes('h ago');
    if (statusF === 'risk') matchStatus = s.risk;
    if (statusF === 'top') matchStatus = s.avg >= 88;
    return matchSearch && matchClass && matchStatus;
  });
  renderStudents(filtered);
}

function setSort(btn, field) {
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const sorted = [...students].sort((a,b) => {
    if (field === 'xp') return b.xp - a.xp;
    if (field === 'grade') return b.avg - a.avg;
    if (field === 'name') return a.name.localeCompare(b.name);
    return 0;
  });
  renderStudents(sorted);
}

function loadPage() {
  LvlAuth.requireAuth(['teacher']);
  document.getElementById('sidebarName').textContent = 'Ms. Johnson';
  document.getElementById('avatarInitial').textContent = 'J';
  renderStudents(students);
}
loadPage();
LvlSecurity.initActivityTracking();
</script>
</body>
</html>
