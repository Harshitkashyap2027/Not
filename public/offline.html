<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>You're Offline — lvlBase</title>
<link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/core/css/base.css">
<style>
.offline-page{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;position:relative;overflow:hidden;}
.offline-page::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(0,206,201,.1),transparent 70%);}
.offline-inner{position:relative;z-index:1;max-width:480px;}
.offline-icon{font-size:5rem;margin-bottom:16px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
.offline-title{font-size:2rem;font-weight:800;margin-bottom:12px;}
.offline-desc{color:rgba(255,255,255,.6);font-size:1rem;line-height:1.7;margin-bottom:32px;}
.offline-tip{display:flex;align-items:center;gap:10px;padding:14px 20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;text-align:left;margin-bottom:28px;font-size:.9rem;color:rgba(255,255,255,.7);}
</style>
</head>
<body>
<div class="offline-page">
  <div class="offline-inner">
    <div class="offline-icon">📡</div>
    <h1 class="offline-title">You're Offline</h1>
    <p class="offline-desc">No internet connection detected. Some features are available offline thanks to lvlBase's service worker cache.</p>
    <div class="offline-tip">
      <span style="font-size:1.4rem">💡</span>
      <span>Check your Wi-Fi or mobile data connection, then tap <strong>Try Again</strong> to reload.</span>
    </div>
    <button class="btn btn-primary" onclick="window.location.reload()">🔄 Try Again</button>
  </div>
</div>
</body>
</html>
